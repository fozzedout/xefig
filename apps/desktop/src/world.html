<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Xefig — World</title>
  <style>
    :root {
      color-scheme: dark;
      --classroom: #50d070;
      --school: #40d0f0;
      --outside: #f0a040;
      --online: #f0d040;
      --locked: #5a5a66;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 80% -10%, rgba(80,90,160,0.25), transparent 60%),
        radial-gradient(900px 600px at 0% 110%, rgba(40,120,90,0.18), transparent 55%),
        #0a0a0f;
      color: #f0f0f4;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
    }
    header { padding: 2rem 2rem 0.5rem; }
    header h1 { margin: 0; font-weight: 600; font-size: 1.6rem; letter-spacing: 0.02em; }
    header p { margin: 0.35rem 0 0; opacity: 0.65; font-size: 0.95rem; }
    .top-links { position: absolute; top: 1.5rem; right: 2rem; font-size: 0.85rem; }
    .top-links a { color: #aab; text-decoration: none; opacity: 0.8; }
    .top-links a:hover { opacity: 1; text-decoration: underline; }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 2rem; padding: 1rem 2rem 3rem; }

    /* ---- The journey trail ---- */
    .trail { display: flex; align-items: stretch; gap: 0; overflow-x: auto; padding: 1rem 0.25rem; }
    .node {
      flex: 0 0 auto; width: 190px; min-height: 150px;
      border-radius: 16px; padding: 1.1rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; position: relative;
      display: flex; flex-direction: column; gap: 0.35rem;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }
    .node:hover { transform: translateY(-3px); background: rgba(255,255,255,0.09); }
    .node.selected { border-color: var(--accent); background: rgba(255,255,255,0.10); }
    .node::before {
      content: ''; position: absolute; left: 0; top: 1rem; bottom: 1rem; width: 4px;
      border-radius: 4px; background: var(--accent);
    }
    .node .tier { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; }
    .node .title { font-size: 1.15rem; font-weight: 600; }
    .node .sub { font-size: 0.85rem; color: var(--accent); font-weight: 500; }
    .node .meta { margin-top: auto; font-size: 0.78rem; opacity: 0.55; }
    .node .dots { display: flex; gap: 4px; margin-top: 0.25rem; }
    .node .dots i { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.18); }
    .node .dots i.on { background: var(--accent); }
    .node.locked { cursor: default; opacity: 0.55; }
    .node.locked:hover { transform: none; background: rgba(255,255,255,0.05); }
    .node.online .title::after { content: ' 🗼'; }

    .connector { flex: 0 0 auto; align-self: center; width: 34px; height: 3px; background: linear-gradient(90deg, rgba(255,255,255,0.25), rgba(255,255,255,0.08)); border-radius: 2px; }
    .connector.dashed { background: none; border-top: 3px dashed rgba(255,255,255,0.18); height: 0; }

    /* ---- Mode panel ---- */
    .panel { min-height: 132px; }
    .panel .panel-head { display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 0.85rem; }
    .panel .panel-head h2 { margin: 0; font-weight: 600; font-size: 1.2rem; }
    .panel .panel-head .sub { color: var(--accent); font-weight: 500; }
    .panel .panel-head .date { opacity: 0.5; font-size: 0.82rem; margin-left: auto; }
    .modes { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 0.6rem; max-width: 760px; }
    button.mode {
      appearance: none; border: 0; border-radius: 10px; padding: 0.85rem 0.5rem;
      background: rgba(255,255,255,0.07); color: #f0f0f4; cursor: pointer;
      font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      transition: background 120ms ease, transform 120ms ease;
    }
    button.mode:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }
    button.mode .label { font-weight: 600; font-size: 0.92rem; }
    button.mode .params { font-size: 0.72rem; opacity: 0.6; }
    button.mode[data-accent="jigsaw"]   { box-shadow: inset 0 -3px 0 #f0c040; }
    button.mode[data-accent="sliding"]  { box-shadow: inset 0 -3px 0 #40d0f0; }
    button.mode[data-accent="swap"]     { box-shadow: inset 0 -3px 0 #50d070; }
    button.mode[data-accent="polygram"] { box-shadow: inset 0 -3px 0 #a060f0; }
    button.mode[data-accent="diamond"]  { box-shadow: inset 0 -3px 0 #e070a0; }
    .panel .hint { opacity: 0.5; font-size: 0.9rem; }
    .panel .online-cta {
      appearance: none; border: 1px solid var(--online); background: rgba(240,208,64,0.12);
      color: #f0f0f4; border-radius: 10px; padding: 0.7rem 1.4rem; cursor: pointer; font: inherit; font-weight: 600;
    }
    .panel .online-cta:hover { background: rgba(240,208,64,0.22); }
    .error { color: #f88; padding: 2rem; }
  </style>
</head>
<body>
  <div class="top-links"><a href="/demo-harness">Timing harness →</a></div>
  <header>
    <h1>Xefig</h1>
    <p>Follow the trail — each area ramps up. The lighthouse opens the live daily and full archive.</p>
  </header>
  <main>
    <div class="trail" id="trail"></div>
    <section class="panel" id="panel">
      <p class="hint">Pick an area above to choose a puzzle.</p>
    </section>
  </main>

  <script>
    const MODE_LABEL = { jigsaw: 'Jigsaw', sliding: 'Slider', swap: 'Swap', polygram: 'Polygram', diamond: 'Diamond' }
    const MODES = ['jigsaw', 'sliding', 'swap', 'polygram', 'diamond']
    const TIER_ACCENT = { classroom: 'var(--classroom)', school: 'var(--school)', outside: 'var(--outside)' }

    function paramsFor(raw) {
      if (!raw) return ''
      if (raw.cols && raw.rows) return `${raw.cols}×${raw.rows}`
      if (raw.shards) return `${raw.shards} shards`
      if (raw.targetCells) return `${raw.targetCells} cells`
      return ''
    }

    // Launch a curated/demo area through the same path the timing harness
    // uses: flag the bundle that this is a demo session and where to bounce
    // back to when the player exits the puzzle, then hand off to the
    // launcher with ?demo=<area>-<mode>.
    function launchMode(areaId, modeSlug) {
      try {
        sessionStorage.setItem('xefig:demo-session', '1')
        sessionStorage.setItem('xefig:demo-return', '/hub')
      } catch {}
      window.location.href = `/?demo=${encodeURIComponent(areaId)}-${encodeURIComponent(modeSlug)}`
    }

    // The Online tier IS the normal app (live daily + archive). Clear the
    // demo flags so the launcher runs normally and doesn't bounce back here.
    function enterOnline() {
      try {
        sessionStorage.removeItem('xefig:demo-session')
        sessionStorage.removeItem('xefig:demo-return')
      } catch {}
      window.location.href = '/'
    }

    function renderPanel(area) {
      const panel = document.getElementById('panel')
      const accent = TIER_ACCENT[area.id] || 'var(--classroom)'
      panel.style.setProperty('--accent', accent)
      const buttons = MODES.map((m) => {
        const params = paramsFor(area.difficulties?.[m])
        return `<button class="mode" data-accent="${m}" data-mode="${m}">
          <span class="label">${MODE_LABEL[m]}</span><span class="params">${params}</span></button>`
      }).join('')
      panel.innerHTML = `
        <div class="panel-head">
          <h2>${area.title}</h2>
          <span class="sub">${area.subtitle || ''}</span>
          <span class="date">${area.puzzleDate} · est. ${area.estimatedMinutes || '?'} min</span>
        </div>
        <div class="modes">${buttons}</div>`
      panel.querySelectorAll('button.mode').forEach((btn) => {
        btn.addEventListener('click', () => launchMode(area.id, btn.dataset.mode))
      })
    }

    function renderOnlinePanel() {
      const panel = document.getElementById('panel')
      panel.style.setProperty('--accent', 'var(--online)')
      panel.innerHTML = `
        <div class="panel-head"><h2>Online</h2><span class="sub">Live daily + full archive</span></div>
        <p class="hint">A fresh hand-made puzzle every day, plus every past day back to launch — free, forever.</p>
        <button class="online-cta">Open today's puzzle →</button>`
      panel.querySelector('.online-cta').addEventListener('click', enterOnline)
    }

    function selectNode(el) {
      document.querySelectorAll('.node').forEach((n) => n.classList.remove('selected'))
      el.classList.add('selected')
    }

    fetch('/demo-config.json').then((r) => r.json()).then((cfg) => {
      const trail = document.getElementById('trail')
      const areas = cfg.areas || []

      areas.forEach((area, i) => {
        if (i > 0) trail.append(Object.assign(document.createElement('div'), { className: 'connector' }))
        const accent = TIER_ACCENT[area.id] || 'var(--classroom)'
        const filled = i + 1 // escalating difficulty dots
        const dots = Array.from({ length: areas.length }, (_, d) => `<i class="${d < filled ? 'on' : ''}"></i>`).join('')
        const node = document.createElement('div')
        node.className = 'node'
        node.style.setProperty('--accent', accent)
        node.innerHTML = `
          <span class="tier">Area ${i + 1}</span>
          <span class="title">${area.title}</span>
          <span class="sub">${area.subtitle || ''}</span>
          <div class="dots">${dots}</div>
          <span class="meta">est. ${area.estimatedMinutes || '?'} min</span>`
        node.addEventListener('click', () => { selectNode(node); renderPanel(area) })
        trail.append(node)
      })

      // Online (lighthouse) node.
      trail.append(Object.assign(document.createElement('div'), { className: 'connector' }))
      const online = document.createElement('div')
      online.className = 'node online'
      online.style.setProperty('--accent', 'var(--online)')
      online.innerHTML = `
        <span class="tier">Lighthouse</span>
        <span class="title">Online</span>
        <span class="sub">Daily + archive</span>
        <span class="meta">free, forever</span>`
      online.addEventListener('click', () => { selectNode(online); renderOnlinePanel() })
      trail.append(online)

      // Locked "full game" node — the upsell. Wired to the Steam store
      // overlay in the shipped build; a hint for now.
      trail.append(Object.assign(document.createElement('div'), { className: 'connector dashed' }))
      const locked = document.createElement('div')
      locked.className = 'node locked'
      locked.style.setProperty('--accent', 'var(--locked)')
      locked.innerHTML = `
        <span class="tier">🔒 Full game</span>
        <span class="title">More worlds</span>
        <span class="sub">Dozens of curated areas</span>
        <span class="meta">in the full game</span>`
      trail.append(locked)
    }).catch((err) => {
      document.body.insertAdjacentHTML('beforeend', `<p class="error">Failed to load demo-config.json: ${err.message}</p>`)
    })
  </script>
</body>
</html>
