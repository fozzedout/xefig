<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xefig - Admin Dashboard</title>
    <link rel="stylesheet" href="./src/admin.css" />
  </head>
  <body>
    <div class="admin-container">
      <header class="admin-header">
        <h1>Xefig Admin</h1>
        <p>Manage Daily Puzzles</p>
      </header>
      
      <div class="card">
        <form id="upload-form" aria-label="Upload daily puzzle">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="admin" autocomplete="username">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
          </div>
          
          <div class="divider"></div>

          <div class="form-group">
            <label for="date">Puzzle Date</label>
            <input type="date" id="date" name="date" required>
          </div>

          <div class="form-group">
            <label for="theme">Puzzle Theme</label>
            <input type="text" id="theme" name="theme" placeholder="e.g. Neon City" required>
          </div>

          <div class="form-group">
            <label for="image">Puzzle Image</label>
            <div class="file-upload">
              <input type="file" id="image" name="image" accept="image/png, image/jpeg" required>
              <span class="file-custom"></span>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="btn-primary">
            Upload Puzzle
          </button>
        </form>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>
    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
