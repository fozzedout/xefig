<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#863bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Xefig" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Xefig | Daily Puzzle Game</title>
    <meta name="description" content="Xefig — a daily puzzle game with four modes: jigsaw, slider, tile swap, and polygram." />
    <meta name="ai-content-declaration" content="Puzzle images on this site are generated using artificial intelligence (Google Gemini)." />
    <meta name="generator" content="AI-generated imagery via Google Gemini" />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      // Preload the LCP image (first slice thumbnail) from localStorage cache.
      // Images change once per day so the cached URL is almost always correct.
      // Only preload the first image to avoid competing bandwidth for non-LCP images.
      (function(){
        try{
          var c=JSON.parse(localStorage.getItem('xefig:daily-cache'));
          if(!c||!c.categories||!c.date)return;
          // Only preload if cache is from today
          var today=new Date().toISOString().slice(0,10);
          if(c.date!==today)return;
          var a=c.categories.jigsaw;
          var u=a&&(a.thumbnailUrl||a.imageUrl);
          if(u){
            var l=document.createElement('link');l.rel='preload';l.as='image';l.href=u;
            l.fetchPriority='high';
            document.head.appendChild(l);
          }
        }catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <!-- Pre-rendered shell: replaced by initAppShell() once the module loads. -->
      <div class="app-page visible" style="background:#0a0a0f;display:grid;place-items:center;color:rgba(232,230,224,0.5);font-size:0.9rem;height:100%">
        Loading&hellip;
      </div>
    </div>
    <script>
      // Start the daily puzzle fetch immediately — runs in parallel with module download.
      window.__earlyPuzzle=fetch('/api/puzzles/today').then(function(r){
        if(!r.ok)throw new Error('Puzzle fetch failed');
        return r.json();
      }).then(function(p){
        if(p&&p.date&&p.categories){
          try{localStorage.setItem('xefig:daily-cache',JSON.stringify({
            date:p.date,categories:p.categories
          }))}catch(e){}
        }
        return p;
      }).catch(function(){return null});
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
