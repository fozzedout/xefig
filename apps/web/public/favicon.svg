<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Rounded background -->
  <rect width="48" height="48" rx="10" fill="#1a1a2e"/>
  <!-- 3x3 tile grid with gaps — settled pieces -->
  <!-- Row 1 -->
  <rect x="4" y="4" width="11.5" height="11.5" rx="2.5" fill="#863bff"/>
  <rect x="18.25" y="4" width="11.5" height="11.5" rx="2.5" fill="#47bfff"/>
  <rect x="32.5" y="4" width="11.5" height="11.5" rx="2.5" fill="#ff6b8a"/>
  <!-- Row 2 -->
  <rect x="4" y="18.25" width="11.5" height="11.5" rx="2.5" fill="#ffb347"/>
  <rect x="18.25" y="18.25" width="11.5" height="11.5" rx="2.5" fill="#5de8a0"/>
  <!-- Row 2, col 3: missing piece (gap) -->
  <!-- Row 3 -->
  <rect x="4" y="32.5" width="11.5" height="11.5" rx="2.5" fill="#ff6b8a"/>
  <rect x="18.25" y="32.5" width="11.5" height="11.5" rx="2.5" fill="#863bff"/>
  <rect x="32.5" y="32.5" width="11.5" height="11.5" rx="2.5" fill="#47bfff"/>
  <!-- Displaced piece (was row 2 col 3) — tilted and offset -->
  <rect x="32.5" y="18.25" width="11.5" height="11.5" rx="2.5" fill="#ffb347" transform="rotate(12 38.25 24)" opacity="0.92"/>
</svg>
