<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <clipPath id="bg3">
      <rect width="48" height="48" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#bg3)">
    <rect width="48" height="48" fill="#1a1a2e"/>

    <!-- Mosaic bloom — irregular shards forming a circle -->

    <!-- Center shard (hexagonal) -->
    <polygon points="27,18 34,24 30,31 20,31 14,24 19,18" fill="#863bff"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Shard 1: top-right triangle -->
    <polygon points="24,6 35,10 27,18" fill="#47bfff"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Shard 2: right quad -->
    <polygon points="35,10 42,22 34,24 27,18" fill="#ff6b8a"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Shard 3: lower-right — slightly drifting -->
    <polygon points="42,22 37,36 30,31 34,24" fill="#5de8a0"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"
             transform="translate(1,1) rotate(3 37 29)" opacity="0.93"/>

    <!-- Shard 4: bottom quad -->
    <polygon points="37,36 24,42 20,31 30,31" fill="#ffb347"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Shard 5: lower-left quad -->
    <polygon points="24,42 11,36 14,24 20,31" fill="#47bfff"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Shard 6: left quad -->
    <polygon points="11,36 6,22 19,18 14,24" fill="#ff6b8a"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Shard 7: upper-left pentagon — floating, about to settle -->
    <polygon points="6,22 13,10 24,6 27,18 19,18" fill="#ffb347"
             stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round"
             transform="translate(-3,-2) rotate(-10 16 14)" opacity="0.88"/>
  </g>
</svg>
