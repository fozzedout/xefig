<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <clipPath id="bg2">
      <rect width="48" height="48" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#bg2)">
    <rect width="48" height="48" fill="#1a1a2e"/>

    <!-- Four pieces split by an X — gaps form the X in background color -->

    <!-- Top triangle — in place -->
    <polygon points="8,8 40,8 24,24" fill="#863bff"
             stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"/>

    <!-- Left triangle — in place -->
    <polygon points="8,8 24,24 8,40" fill="#47bfff"
             stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"/>

    <!-- Bottom triangle — in place -->
    <polygon points="8,40 24,24 40,40" fill="#5de8a0"
             stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"/>

    <!-- Right triangle — floating, about to click in -->
    <polygon points="40,8 40,40 24,24" fill="#ff6b8a"
             stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"
             transform="translate(3,-2) rotate(-8 35 24)"
             opacity="0.9"/>
  </g>
</svg>
