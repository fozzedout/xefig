name = "xefig"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "xefig.com"
custom_domain = true

[assets]
directory = "../web/dist"
binding = "STATIC_ASSETS"
run_worker_first = true
not_found_handling = "404-page"
html_handling = "none"

[[r2_buckets]]
binding = "assets"
bucket_name = "assets"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "daily_puzzles"
database_id = "d15bf548-6546-4a58-9d90-a1697b19af08"

[triggers]
crons = ["0 0 * * *", "15 * * * *"]

[[send_email]]
name = "SEND_EMAIL"

[vars]
OPENROUTER_MODEL = "mistralai/ministral-3-3b"
CONTACT_EMAIL = "paul.aspinall@gmail.com"

# ─── Beta environment ────────────────────────────────────────────────
# Parallel deploy at xefig-beta.<account>.workers.dev — no custom
# domain on purpose so it isn't discoverable via xefig.com. Shares the
# live R2 bucket (read-only in practice — beta doesn't run the
# generation cron) so beta testers see real images without running the
# expensive AI pipeline. Has its own D1 so player progress / leaderboard
# writes stay isolated from live. The puzzle-content endpoints fall
# back to proxying live via UPSTREAM_PUZZLE_ORIGIN when the beta DB is
# empty (which it will be, since there's no cron).
#
# One-time setup (run once, copy the returned database_id into the
# d1_databases block below):
#   npx wrangler d1 create daily_puzzles_beta
#   npx wrangler d1 execute daily_puzzles_beta --remote --file schema.sql --env beta
#
# Deploy:
#   npm run deploy:beta  (from repo root)

[env.beta]
name = "xefig-beta"
# Deploy to the workers.dev subdomain ONLY. Explicit empty routes +
# triggers here override the top-level [[routes]] and [triggers] so
# beta can't inherit — and can't accidentally claim xefig.com or run
# the daily cron against beta's empty DB.
workers_dev = true
routes = []

[env.beta.triggers]
crons = []

[env.beta.assets]
directory = "../web/dist"
binding = "STATIC_ASSETS"
run_worker_first = true
not_found_handling = "404-page"
html_handling = "none"

[[env.beta.r2_buckets]]
binding = "assets"
bucket_name = "assets"

[env.beta.ai]
binding = "AI"

[[env.beta.d1_databases]]
binding = "DB"
database_name = "daily_puzzles_beta"
database_id = "2ef863e2-05e5-4f0f-832b-f6e1da49fd87"

[[env.beta.send_email]]
name = "SEND_EMAIL"

[env.beta.vars]
IS_BETA = "true"
UPSTREAM_PUZZLE_ORIGIN = "https://xefig.com"
OPENROUTER_MODEL = "mistralai/ministral-3-3b"
CONTACT_EMAIL = "paul.aspinall@gmail.com"
